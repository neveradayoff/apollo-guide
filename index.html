<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Mission Guide</title>
    <style>
        :root {
            --h-bg: #1a0505;
            --h-accent: #ff4d4d;
            --t-bg: #050a1a;
            --t-accent: #4d94ff;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            /* Fallback for browsers that don't support custom units */
            --vh: 1vh;
        }
        
        body {
            margin: 0;
            background: #000;
            color: #f1f1f1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Use the calculated variable to define height */
            height: calc(var(--vh, 1vh) * 100);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            padding-top: env(safe-area-inset-top);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            z-index: 30;
            position: relative;
        }

        .share-trigger {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 15px);
            right: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px;
            border-radius: 10px;
            color: #888;
        }

        .header-graphic { margin-top: 15px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .header-title { margin-top: 5px; font-size: 10px; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; color: #666; }

        .mode-switch {
            display: flex;
            margin: 10px 20px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid var(--glass-border);
        }

        .m-btn {
            flex: 1; padding: 12px; border: none; border-radius: 26px; color: #777; font-weight: 800; background: transparent; font-size: 11px; cursor: pointer; transition: all 0.3s ease;
        }
        .m-btn.active-h { background: var(--h-accent); color: #fff; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3); }
        .m-btn.active-t { background: var(--t-accent); color: #fff; box-shadow: 0 4px 15px rgba(77, 148, 255, 0.3); }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .card { background: var(--glass); border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--glass-border); overflow: hidden; }
        .card-header { width: 100%; padding: 18px; background: none; border: none; color: #fff; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 700; }
        .chevron { width: 7px; height: 7px; border-right: 2px solid #555; border-bottom: 2px solid #555; transform: rotate(45deg); transition: transform 0.3s; }
        .card.open .chevron { transform: rotate(-135deg); border-color: #fff; }
        .card-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; padding: 0 18px; }
        .card.open .card-body { max-height: 800px; padding: 0 18px 20px; }
        .card-text { font-size: 14px; line-height: 1.6; color: #aaa; margin: 0; }

        .q-item { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 20px; margin-bottom: 12px; border-left: 4px solid #444; font-style: italic; font-size: 15px; }

        /* The Footer Group: Moonscape + Nav */
        .footer-container {
            flex-shrink: 0;
            background: #000;
            z-index: 30;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .moonscape-divider {
            height: 40px;
            width: 100%;
            background: linear-gradient(to top, #000, transparent);
            margin-bottom: -1px; /* Avoid tiny gaps */
        }

        .moonscape-svg {
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0.4;
            color: #333;
        }

        nav {
            background: #0a0a0a;
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            padding-bottom: 10px;
            border-top: 1px solid var(--glass-border);
        }

        .n-btn {
            background: none; border: none; color: #555; font-size: 8px; font-weight: 900; display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; outline: none;
        }
        .n-btn.active { color: #fff; }
        .icon-circle { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
        .n-btn.active .icon-circle { background: rgba(255,255,255,0.15); transform: scale(1.1); }
        svg.nav-icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        #toast { position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 700; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
    </style>
</head>
<body id="body">

    <header>
        <button class="share-trigger" onclick="copyAppLink()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
        <div class="header-graphic" id="main-graphic"></div>
        <div class="header-title" id="mode-label">THE ARCHIVE</div>
        <div class="mode-switch">
            <button id="mh" class="m-btn active-h" onclick="setMode('h')">SKEPTICAL</button>
            <button id="mt" class="m-btn" onclick="setMode('t')">OFFICIAL</button>
        </div>
    </header>

    <main id="view"></main>

    <div id="toast">Link Copied!</div>

    <div class="footer-container">
        <!-- Spacer Moonscape -->
        <div class="moonscape-divider">
            <svg class="moonscape-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path fill="currentColor" d="M0,100 L0,70 C100,65 150,90 250,75 C350,60 450,95 550,70 C650,45 800,85 1000,60 L1000,100 Z"></path>
            </svg>
        </div>

        <nav>
            <button id="ns" class="n-btn active" onclick="setTab('s')">
                <div class="icon-circle"><svg class="nav-icon"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                FACTS
            </button>
            <button id="nu" class="n-btn" onclick="setTab('u')">
                <div class="icon-circle"><svg class="nav-icon"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
                LORE
            </button>
            <button id="nq" class="n-btn" onclick="setTab('q')">
                <div class="icon-circle"><svg class="nav-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
                DEBATE
            </button>
            <button id="ne" class="n-btn" onclick="setTab('e')">
                <div class="icon-circle"><svg class="nav-icon"><path d="M10 3H6a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
                ESCAPE
            </button>
        </nav>
    </div>

    <script>
        // CRITICAL MOBILE FIX: Calculate true viewport height
        function resetHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', resetHeight);
        resetHeight();

        var currentMode = 'h';
        var currentTab = 's';
        
        const contentData = {
            h: {
                s: [
                    {t:"The Van Allen Barrier", d:"Crossing the radiation belts in 1969 with thin aluminum shielding should have been fatal."},
                    {t:"Shadow Inconsistencies", d:"Photos show shadows pointing in different directions. This suggests studio spotlights."},
                    {t:"Vacuum Flag Ripples", d:"The flag flutters in the breeze. NASA says it's 'momentum', but it moves after the astronauts let go."},
                    {t:"The Starless Void", d:"No stars are visible in any lunar photos. The sky should be filled with light."},
                    {t:"No Landing Crater", d:"A 10,000lb thrust engine landed on soft dust and didn't leave a mark."},
                    {t:"The 'C' Rock", d:"A rock has a perfect 'C' printed on it. It’s a prop letter for set dressing."},
                    {t:"Missing Telemetry Tapes", d:"NASA admits they 'lost' or recorded over 700 boxes of high-res telemetry tapes."},
                    {t:"Crosshair Overlays", d:"Some photos show the camera's etched crosshairs 'behind' objects on the lunar surface."},
                    {t:"Identical Backgrounds", d:"Footage from miles apart show identical hills and craters in the background."},
                    {t:"Slow Motion Simulation", d:"If you speed up moon-walking footage by 2.5x, it looks identical to Earth running."}
                ],
                u: [
                    {t:"Kubrick's Confession", d:"Stanley Kubrick allegedly directed the footage. He hid clues in 'The Shining'."},
                    {t:"1.6x Speed", d:"Play lunar footage at 1.6x speed and the astronauts move exactly like they are on a 1G Earth set."},
                    {t:"Area 51 Moonscape", d:"Whistleblowers say a 1:1 replica of the moon was built in the Nevada desert for filming."},
                    {t:"Nixon's Secret Tape", d:"The 'live' broadcast had a delay to allow editors to cut the feed if a studio light fell."},
                    {t:"The Flat Earth Angle", d:"If the Earth is flat, space travel is physically impossible, making moon landings a necessity to lie about."},
                    {t:"Nazi Scientists", d:"Operation Paperclip scientists knew the tech wasn't ready and insisted on the 'TV version'."},
                    {t:"Hollow Moon Theory", d:"The landing module crash caused ringing like a bell because the moon is an artificial satellite."},
                    {t:"The Silent Rover", d:"Engine noise from the lunar rover was missing in early tests, so they muted the whole thing."},
                    {t:"Helium Balloon Suits", d:"The bulky suits were filled with helium to make the actors 'lighter' on their feet."},
                    {t:"The Invisible Wires", d:"Digital restoration occasionally reveals thin light glints above the astronauts' heads."}
                ],
                q: [
                    "Why haven't we been back in 50 years?", 
                    "Where are the tapes NASA lost?", 
                    "How did film survive 250°F heat?", 
                    "Why is the engine exhaust silent?",
                    "Who filmed Armstrong stepping out?",
                    "Why did the astronauts look depressed at the press conference?",
                    "How did the gold foil survive the ascent blast?",
                    "Why does the sand move like it has moisture?",
                    "Why are the Hasselblad cameras not shielded from radiation?",
                    "How did 400,000 people keep a secret? (They didn't, they were compartmentalized)."
                ],
                e: [
                    "I'm just asking questions.", 
                    "Look it up yourself.", 
                    "History is written by the victors.", 
                    "Think for yourself.",
                    "The truth is out there.",
                    "Follow the money.",
                    "NASA stands for Never A Straight Answer.",
                    "Distrust authority.",
                    "Eyes open, ears shut.",
                    "Question everything."
                ]
            },
            t: {
                s: [
                    {t:"The Soviet Witness", d:"The USSR tracked the signal to the moon. They would have exposed a fake instantly."},
                    {t:"Laser Retroreflectors", d:"Astronauts left mirrors on the moon. Any observatory can fire a laser at them for a reflection."},
                    {t:"Waterless Moon Rocks", d:"The 842lbs of rocks are anhydrous. No rock on Earth is completely water-free."},
                    {t:"LRO Satellite Photos", d:"The LRO photographed the landing sites in 2009. You can see the rover tracks."},
                    {t:"Independent Radio Amateurs", d:"Hams around the world pointed their own dishes and heard the direct lunar signal."},
                    {t:"Shadow Geometry", d:"Topographical bumps on the moon cause shadows to look 'parallel' but distorted to cameras."},
                    {t:"Lunar Dust Physics", d:"In a vacuum, dust doesn't billow (no air); it follows perfect parabolic arcs, impossible to fake in 1969."},
                    {t:"Telemetry Data", d:"Mountains of raw data streams from the DSN stations prove a consistent lunar origin."},
                    {t:"Third Party Imagery", d:"India, China, and Japan have all photographed the landing sites with their own orbiters."},
                    {t:"Astronaut Longevity", d:"The radiation doses were tracked and matched the expected levels for a fast transit."}
                ],
                u: [
                    {t:"Secret Space Program", d:"We didn't stop going; we just went secret. There are bases on the far side."},
                    {t:"The Moon Rang", d:"When Apollo 12's stage crashed, the moon 'rang like a bell' for an hour."},
                    {t:"Ancient Glass Ruins", d:"Whistleblowers claim astronauts found glass towers hidden from the public."},
                    {t:"Alien Monitoring", d:"Astronauts reported 'lights' following the craft, but it was scrubbed from the public transcript."},
                    {t:"The Real Tapes", d:"The missing tapes contain the 'real' first contact that happened before the broadcast."},
                    {t:"Gravity Anomaly", d:"The moon has MASCONS (mass concentrations) that prove it's a solid, natural body."},
                    {t:"Bio-Fluorescence", d:"Some lunar craters showed signs of glowing bacteria that was classified immediately."},
                    {t:"The 20-Year Delay", d:"The reason we didn't go back was a treaty signed with lunar 'entities'."},
                    {t:"Mars via Moon", d:"The Apollo missions were proof-of-concept for a Mars mission that happened in 1985."},
                    {t:"Psychological Screening", d:"Astronauts were chosen for their ability to hide the spiritual shock of seeing Earth from afar."}
                ],
                q: [
                    "How do you simulate vacuum dust?", 
                    "Who placed the mirrors?", 
                    "Why did Russia stay silent?", 
                    "How do you fake 1/6th gravity for hours?",
                    "Where did 842lbs of alien rock come from?",
                    "How do thousands of engineers lie for decades?",
                    "Why are the tracks still visible in modern high-res satellite photos?",
                    "How did amateur radio operators 'fake' their own signal tracking?",
                    "Why does the math for the fuel work out perfectly?",
                    "What benefit is there to lying about it?"
                ],
                e: [
                    "Science is true regardless of belief.", 
                    "Math doesn't have an agenda.", 
                    "Occam's Razor: 400,000 people aren't liars.", 
                    "Trust the astronauts.",
                    "Look at the evidence.",
                    "Nature doesn't lie.",
                    "Achievement unlocked.",
                    "The stars are for everyone.",
                    "Knowledge is power.",
                    "Ad Astra."
                ]
            }
        };

        function setMode(m) {
            currentMode = m;
            const b = document.getElementById('body');
            const label = document.getElementById('mode-label');
            const graphic = document.getElementById('main-graphic');
            b.style.backgroundColor = m == 'h' ? 'var(--h-bg)' : 'var(--t-bg)';
            label.innerText = m == 'h' ? "THE SKEPTIC'S FILE" : "THE OFFICIAL RECORD";
            label.style.color = m == 'h' ? 'var(--h-accent)' : 'var(--t-accent)';
            graphic.innerHTML = m == 'h' ? 
                `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>` : 
                `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4d94ff" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>`;
            document.getElementById('mh').className = 'm-btn' + (m == 'h' ? ' active-h' : '');
            document.getElementById('mt').className = 'm-btn' + (m == 't' ? ' active-t' : '');
            render();
        }

        function setTab(t) {
            currentTab = t;
            ['ns', 'nu', 'nq', 'ne'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById('n' + t).classList.add('active');
            render();
        }

        function toggleCard(id) {
            const card = document.getElementById('card-' + id);
            const isOpen = card.classList.contains('open');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
            if (!isOpen) card.classList.add('open');
        }

        function render() {
            const container = document.getElementById('view');
            const items = contentData[currentMode][currentTab];
            let html = '';
            if (currentTab === 'q' || currentTab === 'e') {
                const color = currentMode === 'h' ? 'var(--h-accent)' : 'var(--t-accent)';
                items.forEach(text => html += `<div class="q-item" style="border-left-color: ${color}">"${text}"</div>`);
            } else {
                items.forEach((item, i) => {
                    html += `<div class="card" id="card-${i}"><button class="card-header" onclick="toggleCard(${i})"><span>${item.t}</span><div class="chevron"></div></button><div class="card-body"><p class="card-text">${item.d}</p></div></div>`;
                });
            }
            container.innerHTML = html;
            container.scrollTop = 0;
        }

        function copyAppLink() {
            const el = document.createElement('textarea');
            el.value = window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        window.onload = () => setMode('h');
    </script>
</body>
</html>
