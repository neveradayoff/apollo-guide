<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Mission Guide</title>
    <style>
        :root {
            --h-bg: #1a0505;
            --h-accent: #ff4d4d;
            --t-bg: #050a1a;
            --t-accent: #4d94ff;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body {
            margin: 0;
            background: #000;
            color: #f1f1f1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.5s ease;
            -webkit-tap-highlight-color: transparent; /* Fixes blue tap highlight on iOS */
        }

        header {
            padding-top: env(safe-area-inset-top);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
            position: relative;
        }

        .share-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px;
            border-radius: 10px;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-graphic {
            margin-top: 20px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-title {
            margin-top: 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
            color: #666;
        }

        .mode-switch {
            display: flex;
            margin: 15px 25px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid var(--glass-border);
        }

        .m-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 26px;
            color: #777;
            font-weight: 800;
            background: transparent;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer; /* Required for iOS click detection */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .m-btn.active-h { background: var(--h-accent); color: #fff; box-shadow: 0 4px 20px rgba(255, 77, 77, 0.4); }
        .m-btn.active-t { background: var(--t-accent); color: #fff; box-shadow: 0 4px 20px rgba(77, 148, 255, 0.4); }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .card {
            background: var(--glass);
            border-radius: 20px;
            margin-bottom: 14px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .card-header {
            width: 100%;
            padding: 20px;
            background: none;
            border: none;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .chevron {
            width: 8px;
            height: 8px;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            transform: rotate(45deg);
            transition: transform 0.4s ease;
        }

        .card.open .chevron { transform: rotate(-135deg); border-color: #fff; }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
            padding: 0 20px;
        }

        .card.open .card-body {
            max-height: 1000px;
            padding: 0 20px 25px;
        }

        .card-text {
            font-size: 15px;
            line-height: 1.6;
            color: #aaa;
            margin: 0;
        }

        .q-item {
            background: rgba(255,255,255,0.03);
            padding: 22px;
            border-radius: 24px;
            margin-bottom: 15px;
            border-left: 5px solid #444;
            font-style: italic;
            font-size: 16px;
            line-height: 1.5;
        }

        nav {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            padding-top: 20px;
            /* Increased bottom padding for Safari navigation bars on iPhone */
            padding-bottom: calc(50px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--glass-border);
            z-index: 20;
        }

        .n-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 8px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            cursor: pointer; /* Required for iOS click detection */
            outline: none;
        }

        .n-btn.active { color: #fff; }

        .icon-circle { 
            width: 32px; height: 32px; 
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            transition: transform 0.2s ease;
        }
        
        .n-btn.active .icon-circle { 
            background: rgba(255,255,255,0.15);
            transform: scale(1.1);
        }

        svg.nav-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        #toast {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body id="body">

    <header>
        <button class="share-trigger" onclick="copyAppLink()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
        <div class="header-graphic" id="main-graphic"></div>
        <div class="header-title" id="mode-label">THE ARCHIVE</div>
        <div class="mode-switch">
            <button id="mh" class="m-btn active-h" onclick="setMode('h')">SKEPTICAL</button>
            <button id="mt" class="m-btn" onclick="setMode('t')">OFFICIAL</button>
        </div>
    </header>

    <main id="view"></main>

    <div id="toast">Link Copied!</div>

    <nav>
        <button id="ns" class="n-btn active" onclick="setTab('s')">
            <div class="icon-circle"><svg class="nav-icon"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            FACTS
        </button>
        <button id="nu" class="n-btn" onclick="setTab('u')">
            <div class="icon-circle"><svg class="nav-icon"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
            LORE
        </button>
        <button id="nq" class="n-btn" onclick="setTab('q')">
            <div class="icon-circle"><svg class="nav-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            DEBATE
        </button>
        <button id="ne" class="n-btn" onclick="setTab('e')">
            <div class="icon-circle"><svg class="nav-icon"><path d="M10 3H6a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
            ESCAPE
        </button>
    </nav>

    <script>
        var currentMode = 'h';
        var currentTab = 's';
        
        const contentData = {
            h: {
                s: [
                    {t:"The Van Allen Barrier", d:"Crossing the radiation belts in 1969 with thin aluminum shielding should have been fatal. Modern probes require lead shielding."},
                    {t:"Shadow Inconsistencies", d:"Photos show shadows pointing in different directions. In space, with one sun, they must be parallel. This suggests studio spotlights."},
                    {t:"Vacuum Flag Ripples", d:"The flag flutters in the breeze. NASA says it's 'momentum' from being planted, but it moves after the astronauts let go."},
                    {t:"The Starless Void", d:"No stars are visible in any lunar photos. The moon has no atmosphere to block them; the sky should be filled with light."},
                    {t:"No Landing Crater", d:"A 10,000lb thrust engine landed on soft dust and didn't leave a mark or blow dust onto the landing pads."},
                    {t:"The 'C' Rock", d:"A rock in photo AS16-107-17446 has a perfect 'C' printed on it. It’s a prop letter for set dressing."},
                    {t:"Perfect Focus", d:"Chest-mounted cameras with no viewfinders somehow produced thousands of perfectly framed, professional shots."},
                    {t:"Crosshair Anomaly", d:"The camera's etched crosshairs appear *behind* the objects in many photos, suggesting image layering."},
                    {t:"Footprint Physics", d:"A crisp imprint in dry dust requires moisture. In a vacuum, dust shouldn't hold that shape."},
                    {t:"Missing Telemetry Tapes", d:"NASA admits they 'lost' or recorded over 700 boxes of high-res telemetry tapes. The best evidence is gone."},
                    {t:"Heat & Film Survival", d:"Lunar day temps reach 250°F. The Hasselblad camera film should have melted instantly."}
                ],
                u: [
                    {t:"Kubrick's Confession", d:"Stanley Kubrick allegedly directed the footage. He hid clues in 'The Shining'—the Apollo sweater and room 237."},
                    {t:"1.6x Speed", d:"Play lunar footage at 1.6x speed and the astronauts move exactly like they are on a 1G Earth set with hidden wires."},
                    {t:"Area 51 Moonscape", d:"Whistleblowers say a 1:1 replica of the moon was built in the Nevada desert for the 'missions' to be filmed."},
                    {t:"Destroyed Blueprints", d:"NASA admitted they destroyed the tech and blueprints to build the Saturn V. No one deletes history's greatest plans."},
                    {t:"Nixon's Secret Tape", d:"The 'live' broadcast had a delay to allow editors to cut the feed if a studio light fell or a wire snapped."},
                    {t:"Vietnam Distraction", d:"The mission happened during the height of the Vietnam War. Nixon needed a massive patriotic distraction."},
                    {t:"Moon Projection", d:"Theorists believe the moon is a plasma projection. You can't land a metal box on a light projection."},
                    {t:"Soul-Trap Theory", d:"Lore suggests the moon is an artificial satellite used by elite controllers to monitor Earth."},
                    {t:"Antarctic Rocks", d:"Wernher von Braun led an expedition to Antarctica in 1967 to collect meteorites to pass off as 'moon rocks'."},
                    {t:"Paper-Thin Module", d:"Photos of the Lunar Module show it held together by gold foil and tape. It doesn't look space-worthy."},
                    {t:"False Earth Photos", d:"Apollo 8 photos of Earth were allegedly taken through a circular window while low-Earth orbiting."}
                ],
                q: [
                    "Why haven't we been back in 50 years with better tech?",
                    "Where are the 700 boxes of telemetry tapes NASA 'lost'?",
                    "How did film survive 250-degree lunar heat?",
                    "Why does the Earth look like a circular cutout in the window?",
                    "How can crosshairs be behind the objects in the photo?",
                    "Why is there a footprint but no engine exhaust marks?",
                    "Why did the astronauts look so terrified during their first press conference?",
                    "How could they communicate in real-time with zero signal delay?",
                    "Why was the 'C' rock never examined for prop markings?",
                    "Why haven't private telescopes taken a clear photo of the gear?"
                ],
                e: [
                    "I'm just asking questions. Why does that bother you?",
                    "Look it up... if they even let you find it.",
                    "The absence of evidence is not the evidence of absence.",
                    "History is written by the victors. Or the directors.",
                    "I used to believe it too, until I looked at the physics.",
                    "If you trust the government that much, I have a bridge to sell you.",
                    "Cameras don't lie, but the people developing the film do.",
                    "Think for yourself for once.",
                    "Physics doesn't care about your patriotism.",
                    "We'll talk when you've seen the 1.6x speed footage."
                ]
            },
            t: {
                s: [
                    {t:"The Soviet Witness", d:"The USSR tracked the signal to the moon. If we faked it, they would have exposed us instantly to win the race."},
                    {t:"Laser Retroreflectors", d:"Astronauts left mirrors on the moon. Any observatory can fire a laser at them and get a reflection back today."},
                    {t:"Waterless Moon Rocks", d:"The 842lbs of rocks are anhydrous. No rock on Earth is completely water-free. They are truly alien samples."},
                    {t:"Scale of Silence", d:"Over 400,000 people worked on Apollo. A secret that big cannot stay hidden for 50 years."},
                    {t:"LRO Satellite Photos", d:"The Lunar Reconnaissance Orbiter photographed the landing sites in 2009. You can see the rover tracks and equipment."},
                    {t:"Physics of Dust", d:"In a vacuum, dust falls in perfect arcs. On Earth, air makes it swirl. Apollo footage shows perfect vacuum physics."},
                    {t:"Parallax Proof", d:"Stereoscopic analysis of the background mountains proves they are miles away, not a backdrop on a small set."},
                    {t:"The 1.3s Delay", d:"Radio logs show a consistent 1.3-second delay for light-speed travel. Faking that timing for days is impossible."},
                    {t:"Hammer and Feather", d:"Apollo 15 dropped a hammer and feather in the vacuum. They hit at the same time. Only possible without air."},
                    {t:"Chemical Uniqueness", d:"Isotopic analysis shows samples were exposed to cosmic radiation for millions of years, unlike Earth rocks."},
                    {t:"Apollo 13 Failure", d:"If we were faking successes, we wouldn't fake a near-fatal disaster like Apollo 13."}
                ],
                u: [
                    {t:"Secret Space Program", d:"We didn't stop going; we just went secret. There are bases on the far side built with recovered tech."},
                    {t:"The Moon Rang", d:"When Apollo 12's ascent stage crashed, the moon 'rang like a bell' for an hour, suggesting a hollow structure."},
                    {t:"Ancient Glass Ruins", d:"Whistleblowers claim astronauts found glass towers. Fake footage was released to hide alien archaeology."},
                    {t:"Anti-Gravity Tech", d:"The Saturn V was a show. Real missions used recovered Nazi or Alien gravity-drive tech."},
                    {t:"Orange Soil Mystery", d:"Apollo 17 found bright orange volcanic glass beads, though some suspect ancient terraforming artifacts."},
                    {t:"The Monolith", d:"Astronauts supposedly discovered a geometric structure in Tycho crater that was immediately classified."},
                    {t:"Dark Side Orbs", d:"Unreleased transcripts mention 'bogies' or glowing orbs following the Command Module during orbit."},
                    {t:"遠隔通信 (Far Signals)", d:"Radio amateurs claim to have intercepted signals coming from the far side long after 1972."},
                    {t:"Biological Samples", d:"Some lore suggests they didn't just bring back rocks, but dormant microbial life kept in deep storage."},
                    {t:"Artemis Urgency", d:"The 2024 return mission is actually about defending what we left there from other nations."},
                    {t:"Lunar Density", d:"Seismic data suggests the Moon is significantly less dense than a natural rock should be."}
                ],
                q: [
                    "How would a 1960s set simulate vacuum dust physics?",
                    "Who placed the mirrors scientists use every night?",
                    "Why did Russia stay silent about an American lie?",
                    "How do you explain the chemical uniqueness of the rocks?",
                    "Why can we see the gear through modern telescopes?",
                    "If it was a set, why was the signal coming from the moon?",
                    "Why would 400,000 people risk their careers for a lie?",
                    "How do you simulate 1/6th gravity perfectly for hours?",
                    "Why does the LRO see tracks that match the 1969 maps?",
                    "What happened to the 800 pounds of rocks if they aren't real?",
                    "How do you fake seismic moonquakes recorded by instruments?"
                ],
                e: [
                    "It’s okay, not everyone understands orbital mechanics.",
                    "Occam's Razor: 400,000 people aren't perfect liars.",
                    "The beauty of science is that it's true whether you believe it or not.",
                    "You're confusing 'I don't understand' with 'It's impossible.'",
                    "Let's move on. I can't convince you gravity is real today.",
                    "The evidence is there if you're actually looking for truth.",
                    "If you think the USSR was 'in on it', you don't know history.",
                    "Math doesn't have an agenda.",
                    "You can buy a laser and hit the moon yourself. Try it.",
                    "I'll trust the astronauts who actually walked there."
                ]
            }
        };

        function setMode(m) {
            currentMode = m;
            const b = document.getElementById('body');
            const label = document.getElementById('mode-label');
            const graphic = document.getElementById('main-graphic');
            
            b.style.backgroundColor = m == 'h' ? 'var(--h-bg)' : 'var(--t-bg)';
            label.innerText = m == 'h' ? "THE SKEPTIC'S FILE" : "THE OFFICIAL RECORD";
            label.style.color = m == 'h' ? 'var(--h-accent)' : 'var(--t-accent)';
            
            graphic.innerHTML = m == 'h' ? 
                `<svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>` : 
                `<svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#4d94ff" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>`;

            document.getElementById('mh').className = 'm-btn' + (m == 'h' ? ' active-h' : '');
            document.getElementById('mt').className = 'm-btn' + (m == 't' ? ' active-t' : '');
            render();
        }

        function setTab(t) {
            currentTab = t;
            ['ns', 'nu', 'nq', 'ne'].forEach(id => {
                document.getElementById(id).classList.remove('active');
            });
            document.getElementById('n' + t).classList.add('active');
            render();
        }

        function toggleCard(id) {
            const card = document.getElementById('card-' + id);
            const isOpen = card.classList.contains('open');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
            if (!isOpen) card.classList.add('open');
        }

        function render() {
            const container = document.getElementById('view');
            const items = contentData[currentMode][currentTab];
            let html = '';

            if (currentTab === 'q' || currentTab === 'e') {
                const color = currentMode === 'h' ? 'var(--h-accent)' : 'var(--t-accent)';
                items.forEach(text => {
                    html += `<div class="q-item" style="border-left-color: ${color}">"${text}"</div>`;
                });
            } else {
                items.forEach((item, i) => {
                    html += `
                        <div class="card" id="card-${i}">
                            <button class="card-header" onclick="toggleCard(${i})">
                                <span>${item.t}</span>
                                <div class="chevron"></div>
                            </button>
                            <div class="card-body">
                                <p class="card-text">${item.d}</p>
                            </div>
                        </div>`;
                });
            }
            container.innerHTML = html;
            container.scrollTop = 0;
        }

        function copyAppLink() {
            const el = document.createElement('textarea');
            el.value = window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        window.onload = () => setMode('h');
    </script>
</body>
</html>
